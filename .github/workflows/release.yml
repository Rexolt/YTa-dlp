name: Build & Release YTa-dlp

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl wget file libssl-dev pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev libsqlite3-dev libayatana-appindicator3-dev librsvg2-dev rpm zstd

      - name: Install Svelte dependencies
        run: pnpm install

      - name: Fetch sidecar binaries
        run: pnpm run binaries:fetch

      - name: Build Svelte production assets
        run: pnpm run build

      - name: Build Tauri and create GitHub Release
        id: tauri-build
        uses: tauri-apps/tauri-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: 'YTa-dlp v__VERSION__'
          releaseBody: 'Premium downloader powered by yt-dlp. Select the package that fits your Linux distribution.'
          releaseDraft: false
          prerelease: false

      - name: Build Arch Linux Pacman & Fedora RPM packages
        run: |
          DEB_DIR="src-tauri/target/release/bundle/deb"
          ARCH_DIR="src-tauri/target/release/bundle/pacman"
          RPM_DIR="src-tauri/target/release/bundle/rpm"
          
          # Clean up any default RPM that Tauri action might have created (which contains conflicts)
          rm -rf "$RPM_DIR"
          
          DEB_FILE=$(find "$DEB_DIR" -name "*.deb" | head -n 1 || true)
          if [ -n "$DEB_FILE" ]; then
              mkdir -p "$ARCH_DIR"
              mkdir -p "$RPM_DIR"
              
              # Parse version and set build number from GITHUB_RUN_NUMBER
              VERSION=$(node -p "require('./package.json').version")
              BUILD_NUM=${{ github.run_number }}
              
              TEMP_PKG=$(mktemp -d)
              cp "$DEB_FILE" "$TEMP_PKG/"
              cd "$TEMP_PKG"
              
              # Extract the deb package contents
              ar x *.deb
              DATA_TAR=$(find . -name "data.tar.*" | head -n 1)
              mkdir -p pkg
              tar -xf "$DATA_TAR" -C pkg/
              
              # Remove redundant bundled binaries to prevent file conflicts with system packages
              rm -f pkg/usr/bin/ffmpeg
              rm -f pkg/usr/bin/ffprobe
              rm -f pkg/usr/bin/yt-dlp
              
              # --- Build Pacman Package ---
              cat <<EOF > pkg/.PKGINFO
pkgname = yta-dlp
pkgver = ${VERSION}-${BUILD_NUM}
pkgdesc = premium downloader · powered by yt-dlp
url = https://github.com/Rexolt/YTa-dlp
arch = x86_64
license = MIT
depend = gtk3
depend = webkit2gtk-4.1
depend = sqlite
depend = ffmpeg
depend = yt-dlp
EOF
              
              cd pkg
              tar -c --zstd -f ../yta-dlp-${VERSION}-${BUILD_NUM}-x86_64.pkg.tar.zst .PKGINFO usr/
              cp ../yta-dlp-${VERSION}-${BUILD_NUM}-x86_64.pkg.tar.zst ../yta-dlp-${VERSION}-${BUILD_NUM}-x86_64.pacman
              cd ..
              
              mv yta-dlp-${VERSION}-${BUILD_NUM}-x86_64.pkg.tar.zst "$GITHUB_WORKSPACE/$ARCH_DIR/"
              mv yta-dlp-${VERSION}-${BUILD_NUM}-x86_64.pacman "$GITHUB_WORKSPACE/$ARCH_DIR/"
              echo "✓ Arch pacman package successfully compiled!"
              
              # --- Build RPM Package ---
              RPM_BUILD_DIR=$(mktemp -d)
              mkdir -p "$RPM_BUILD_DIR"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}
              
              # Copy the extracted files (without sidecars) to SOURCES/pkg
              cp -r pkg "$RPM_BUILD_DIR/SOURCES/"
              
              cat <<EOF > "$RPM_BUILD_DIR/SPECS/yta-dlp.spec"
Name:           yta-dlp
Version:        ${VERSION}
Release:        ${BUILD_NUM}%{?dist}
Summary:        premium downloader · powered by yt-dlp
License:        MIT
URL:            https://github.com/Rexolt/YTa-dlp
Requires:       gtk3
Requires:       webkit2gtk4.1
Requires:       sqlite
Requires:       /usr/bin/ffmpeg
Requires:       /usr/bin/ffprobe
Requires:       /usr/bin/yt-dlp

%description
premium downloader · powered by yt-dlp

%install
mkdir -p %{buildroot}
cp -r %{_sourcedir}/pkg/* %{buildroot}/

%files
/usr/bin/yta-dlp
/usr/share/applications/YTa-dlp.desktop
/usr/share/icons/hicolor/*/apps/yta-dlp.png
EOF
              
              rpmbuild --define "_topdir $RPM_BUILD_DIR" -bb "$RPM_BUILD_DIR/SPECS/yta-dlp.spec"
              
              GENERATED_RPM=$(find "$RPM_BUILD_DIR/RPMS" -name "*.rpm" | head -n 1 || true)
              if [ -n "$GENERATED_RPM" ]; then
                  cp "$GENERATED_RPM" "$GITHUB_WORKSPACE/$RPM_DIR/yta-dlp-${VERSION}-${BUILD_NUM}.x86_64.rpm"
                  echo "✓ Fedora RPM package successfully compiled!"
              else
                  echo "✗ Failed to locate generated RPM package"
                  exit 1
              fi
              
              rm -rf "$RPM_BUILD_DIR"
          else
              echo "✗ Could not locate .deb package to generate pacman & rpm packages"
              exit 1
          fi

      - name: Upload Arch Linux Pacman & Fedora RPM packages to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            src-tauri/target/release/bundle/pacman/*.pkg.tar.zst
            src-tauri/target/release/bundle/pacman/*.pacman
            src-tauri/target/release/bundle/rpm/*.rpm
